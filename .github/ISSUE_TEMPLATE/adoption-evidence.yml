name: Adoption or outcome evidence
description: Submit a non-confidential public record or request a private review path.
title: "[Evidence]: "
labels: ["evidence-review"]
body:
  - type: markdown
    attributes:
      value: |
        Do not submit confidential telemetry, malware, credentials, customer data, internal reports, private indicators, personal data, or unpublished evidence. Use this form only for information that is already public and safe to disclose. Request a private contact path without attaching evidence when public submission is inappropriate.
  - type: dropdown
    id: evidence_type
    attributes:
      label: Evidence type
      options:
        - Public deployment
        - Package usage
        - Accepted integration
        - Independent review or citation
        - Verified issue resolution
        - Validated detection outcome
        - Repeat-use evidence
        - Request private review path
    validations:
      required: true
  - type: input
    id: product
    attributes:
      label: Product or research item
    validations:
      required: true
  - type: input
    id: supporting_url
    attributes:
      label: Public supporting URL
      description: Leave blank when requesting a private review path.
  - type: textarea
    id: outcome
    attributes:
      label: Verifiable outcome and limitations
      description: State what the evidence proves and what it does not prove.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety and publication confirmation
      options:
        - label: I confirm this submission contains no confidential, customer, regulated, privileged, malicious, credential, or unpublished material.
          required: true
        - label: I understand that submission does not guarantee publication and that 1200km will independently verify the evidence.
          required: true
        - label: I explicitly permit publication of the information I supplied here if it passes review.
          required: true

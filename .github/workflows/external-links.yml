name: External link health

on:
  workflow_dispatch:
  schedule:
    - cron: "19 4 * * 3"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Restore prior link-health state
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .cache/external-links-state.json
          key: external-links-${{ github.run_id }}
          restore-keys: |
            external-links-
      - name: Probe external links
        run: >-
          npm run check-links:external:scheduled --
          --output reports/external-links/latest.json
          --state .cache/external-links-state.json
      - name: Save current link-health state
        if: ${{ always() }}
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .cache/external-links-state.json
          key: external-links-${{ github.run_id }}
      - name: Preserve machine-readable report
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: external-link-health-${{ github.run_id }}
          path: |
            reports/external-links/latest.json
            .cache/external-links-state.json
          if-no-files-found: error
          retention-days: 90

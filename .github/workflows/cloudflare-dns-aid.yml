name: Upsert Cloudflare DNS-AID Records

on:
  workflow_dispatch:

jobs:
  upsert:
    name: Upsert DNS-AID TXT records
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Upsert records
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: node scripts/cloudflare-upsert-dns-aid.mjs

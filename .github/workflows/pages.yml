name: Deploy to GitHub Pages

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '17 2 * * *'
  repository_dispatch:
    types: [rebuild-search]

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

env:
  ARTICLE_ARCHIVE_COMMIT: c57eeaf021b15980ade6be72aeb96ce206489f09

jobs:
  quality:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22
          cache: npm
      - name: Install locked search tooling
        run: npm ci
      - name: Audit dependency graph
        run: npm audit --audit-level=high
      - name: Validate search source
        run: npm run check-release-source
      - name: Stage publishable site
        run: |
          mkdir -p "${RUNNER_TEMP}/site"
          git archive --format=tar --output="${RUNNER_TEMP}/site.tar" HEAD
          tar --extract --file="${RUNNER_TEMP}/site.tar" --directory="${RUNNER_TEMP}/site" \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='cloudflare' \
            --exclude='node_modules' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='scripts' \
            --exclude='tests'
          npm run build-shell -- --site "${RUNNER_TEMP}/site"
          node scripts/inject-search-loader.mjs --site "${RUNNER_TEMP}/site"
      - name: Checkout canonical article archive source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: anpa1200/medium-blog-navigation
          ref: ${{ env.ARTICLE_ARCHIVE_COMMIT }}
          path: .article-archive-source
      - name: Build and stage canonical article archive
        working-directory: .article-archive-source
        run: |
          npm ci
          npm run validate:archive
          npm run validate:media:local
          npm run build:embedded
          mkdir -p "${RUNNER_TEMP}/site/articles"
          cp -a build/. "${RUNNER_TEMP}/site/articles/"
      - name: Stage and verify article governance data
        run: >-
          node scripts/stage-article-archive-governance.mjs
          --site "${RUNNER_TEMP}/site"
          --source "${GITHUB_WORKSPACE}"
          --archive "${GITHUB_WORKSPACE}/.article-archive-source"
          --archive-commit "${ARTICLE_ARCHIVE_COMMIT}"
      - name: Build canonical metadata and release HTML
        run: npm run build-metadata:remote -- --site "${RUNNER_TEMP}/site" --source "${GITHUB_WORKSPACE}"
      - name: Validate complete staged site
        run: |
          npm run check-semantics -- --site "${RUNNER_TEMP}/site"
          npm run check-facts -- --site "${RUNNER_TEMP}/site"
          npm run check-seo -- --site "${RUNNER_TEMP}/site" --require-release-transform
          npm run check-links -- --site "${RUNNER_TEMP}/site"
      - name: Build deployable domain content catalogue
        run: >-
          npm run build-content:remote --
          --site "${RUNNER_TEMP}/site"
          --source "${GITHUB_WORKSPACE}"
          --sitemap "${RUNNER_TEMP}/site/sitemap.xml"
      - name: Apply governed article lifecycle notices
        run: npm run build-lifecycle-banners -- --site "${RUNNER_TEMP}/site"
      - name: Build canonical domain-wide search index
        run: >-
          npm run build-search:remote --
          --site "${RUNNER_TEMP}/site"
          --sitemap "${RUNNER_TEMP}/site/sitemap.xml"
          --output "${RUNNER_TEMP}/site/pagefind"
          --canonical-sitemap-output "${RUNNER_TEMP}/site/sitemap.xml"
          --max-stale-pages 0
      - name: Validate search coverage and ranking
        run: |
          node scripts/check-content-schema.mjs --site "${RUNNER_TEMP}/site"
          node scripts/check-content-catalog.mjs --site "${RUNNER_TEMP}/site"
          npm run check-search:index -- --bundle "${RUNNER_TEMP}/site/pagefind" --remote
      - name: Browser smoke test search and autocomplete
        run: npm run check-search:browser -- --site "${RUNNER_TEMP}/site" --bundle "${RUNNER_TEMP}/site/pagefind"
      - name: Browser mobile typography and overflow regression
        run: >-
          npm run check-layout:browser --
          --site "${RUNNER_TEMP}/site"
          --screenshots "${RUNNER_TEMP}/mobile-layout"
      - name: Browser accessibility and performance regression
        run: >-
          npm run check-quality:browser --
          --site "${RUNNER_TEMP}/site"
          --report "${RUNNER_TEMP}/browser-quality.json"
      - name: Validate deployable-file hygiene
        run: npm run check-hygiene -- --site "${RUNNER_TEMP}/site"
      - name: Revalidate published sitemap and metadata
        run: |
          npm run check-semantics -- --site "${RUNNER_TEMP}/site"
          npm run check-facts -- --site "${RUNNER_TEMP}/site"
          node scripts/check-content-schema.mjs --site "${RUNNER_TEMP}/site"
          node scripts/check-content-catalog.mjs --site "${RUNNER_TEMP}/site"
          npm run check-seo -- --site "${RUNNER_TEMP}/site" --require-release-transform --require-catalog-agreement
          npm run check-links -- --site "${RUNNER_TEMP}/site"
      - name: Emit and validate immutable build identity
        run: |
          npm run build-identity -- \
            --site "${RUNNER_TEMP}/site" \
            --site-commit "${GITHUB_SHA}" \
            --archive-commit "${ARTICLE_ARCHIVE_COMMIT}" \
            --workflow-run-id "${GITHUB_RUN_ID}" \
            --built-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          npm run check-build-identity -- --site "${RUNNER_TEMP}/site" --site-commit "${GITHUB_SHA}"
          npm run check-hygiene -- --site "${RUNNER_TEMP}/site"
      - name: Preserve quality evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: site-quality-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/mobile-layout
            ${{ runner.temp }}/browser-quality.json
            ${{ runner.temp }}/site/pagefind/search-build.json
            ${{ runner.temp }}/site/pagefind/search-governance.json
            ${{ runner.temp }}/site/pagefind/pagefind-entry.json
            ${{ runner.temp }}/site/data/content-catalog.json
            ${{ runner.temp }}/site/data/article-catalog.json
            ${{ runner.temp }}/site/data/article-archive-build.json
            ${{ runner.temp }}/site/reports/article-canonical-migration.csv
            ${{ runner.temp }}/site/reports/content-taxonomy-audit.json
            ${{ runner.temp }}/site/build.json
          if-no-files-found: ignore
          retention-days: 14
      - name: Generate CycloneDX SBOM
        run: npm sbom --sbom-format=cyclonedx > "${RUNNER_TEMP}/site-sbom.cdx.json"
      - name: Preserve release SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: site-sbom-${{ github.run_id }}
          path: ${{ runner.temp }}/site-sbom.cdx.json
          if-no-files-found: error
          retention-days: 90
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: ${{ runner.temp }}/site
          include-hidden-files: true

  deploy:
    if: ${{ github.event_name != 'pull_request' }}
    needs: quality
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
        id: deployment

  production-verification:
    if: ${{ github.event_name != 'pull_request' }}
    needs: deploy
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22
      - name: Verify custom-domain production identity and fingerprints
        run: >-
          node scripts/verify-production.mjs
          --site-commit "${GITHUB_SHA}"
          --archive-commit "${ARTICLE_ARCHIVE_COMMIT}"
          --report "${RUNNER_TEMP}/production-verification.json"
      - name: Preserve production diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: production-verification-${{ github.run_id }}
          path: ${{ runner.temp }}/production-verification.json
          if-no-files-found: error
          retention-days: 30

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Prepare Pages artifact
        run: |
          rm -rf _site
          mkdir -p _site
          rsync -a ./ _site/ \
            --exclude .git \
            --exclude .github \
            --exclude .claude \
            --exclude .codex \
            --exclude _site \
            --exclude node_modules \
            --exclude cloudflare \
            --exclude scripts \
            --exclude QA_CHECKLIST.md \
            --exclude README.md \
            --exclude package.json \
            --exclude package-lock.json \
            --exclude wrangler.toml
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - uses: actions/deploy-pages@v4
        id: deployment

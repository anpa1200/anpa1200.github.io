version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:20"
      timezone: Asia/Jerusalem
    open-pull-requests-limit: 5
    groups:
      site-tooling:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:40"
      timezone: Asia/Jerusalem
    open-pull-requests-limit: 5
    groups:
      workflow-actions:
        patterns:
          - "*"
